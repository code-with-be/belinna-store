<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belinna Store</title>
    <style>
        :root { --primary: #B76E79; --dark: #333; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #fdfbf7; }
        .top-banner { background: var(--primary); color: #fff; text-align: center; padding: 10px; font-size: 0.8rem; text-transform: uppercase; }
        header { padding: 40px 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Estilo do Card */
        .product-card { background: white; padding: 20px; border-radius: 15px; border: 1px solid #eee; text-align: center; }
        .qty-selector { display: inline-flex; align-items: center; gap: 10px; margin: 10px; }
        .btn-add { background: var(--dark); color: white; padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; }
        
        /* Carrinho Lateral Bonito */
        #side-cart { position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.3s; z-index: 1000; padding: 20px; display: flex; flex-direction: column; }
        .cart-open #side-cart { right: 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="top-banner">Atendimento exclusivo pelo WhatsApp | Envio para todo o Brasil 🇧🇷</div>
    
    <header>
        <h1>Belinna Store</h1>
        <p>Sua beleza, nossa missão.</p>
    </header>

    <div class="grid" id="produtos">
        <!-- Card de Produto -->
        <div class="product-card">
            <h3>Batom Matte Velvet Rosé</h3>
            <p><strong>Marca:</strong> Belinna Beauty | <strong>4g</strong></p>
            <p>Alta pigmentação e hidratação por 12h.</p>
            
            <div class="qty-selector">
                <button onclick="changeLocalQty('batom', -1)">-</button>
                <span id="qty-batom">1</span>
                <button onclick="changeLocalQty('batom', 1)">+</button>
            </div>
            <br>
            <button class="btn-add" onclick="addToCart('Batom Matte Velvet Rosé', 89.90, 'batom')">Adicionar ao Carrinho</button>
        </div>
    </div>

    <!-- Carrinho -->
    <div id="side-cart">
        <h2 style="color: var(--primary);">Seu Carrinho</h2>
        <div id="cart-items" style="flex-grow: 1; overflow-y: auto;"></div>
        <p><strong>Total: <span id="cart-total">R$ 0,00</span></strong></p>
        <button onclick="enviarWhatsApp()" style="width: 100%; background: #25D366; color: white; padding: 15px; border: none; cursor: pointer;">Finalizar Pedido (WhatsApp)</button>
        <button onclick="toggleCart()" style="width: 100%; background: #eee; margin-top: 10px; padding: 10px; border: none; cursor: pointer;">Fechar</button>
    </div>

    <script>
        let carrinho = [];
        let localQtys = { batom: 1 };

        function toggleCart() { document.body.classList.toggle('cart-open'); }

        function changeLocalQty(id, delta) {
            localQtys[id] = Math.max(1, localQtys[id] + delta);
            document.getElementById('qty-' + id).innerText = localQtys[id];
        }

        function addToCart(nome, preco, id) {
            let qtd = localQtys[id];
            let item = carrinho.find(i => i.nome === nome);
            if (item) item.qtd += qtd;
            else carrinho.push({ nome, preco, qtd: qtd });
            renderCart();
            toggleCart();
        }

        function renderCart() {
            let container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;
            carrinho.forEach((item, index) => {
                total += item.preco * item.qtd;
                container.innerHTML += `
                    <div class="cart-item">
                        <div><strong>${item.nome}</strong><br>${item.qtd}x R$ ${item.preco.toFixed(2).replace('.',',')}</div>
                        <div>
                            <button onclick="carrinho[${index}].qtd--; renderCart()">-</button>
                            <button onclick="carrinho[${index}].qtd++; renderCart()">+</button>
                            <button onclick="carrinho.splice(${index}, 1); renderCart()">🗑️</button>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
        }

        function enviarWhatsApp() {
            let msg = "Pedido Belinna Store:%0A";
            carrinho.forEach(i => msg += `${i.qtd}x ${i.nome}%0A`);
            window.open(`https://api.whatsapp.com/send?phone=5511993610210&text=${msg}`);
        }
    </script>
</body>
</html>
