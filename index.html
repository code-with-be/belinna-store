<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belinna Store | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --rose: #b76e79; --gold: #d4af37; --off-white: #fdfbf7; --text: #4a4a4a; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--off-white); color: var(--text); margin: 0; }
        
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        header { text-align: center; padding: 60px 20px; }
        header h1 { color: var(--rose); font-size: 2.5rem; margin-bottom: 10px; }
        
        .container { max-width: 900px; margin: auto; padding: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-bottom: 40px; }
        
        .card { background: white; padding: 30px; border-radius: 20px; border: 1px solid #f0e6e6; box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: 0.4s; text-align: center; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(183, 110, 121, 0.15); }
        
        .btn-premium { background: var(--rose); color: white; border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer; transition: 0.3s; font-weight: 600; letter-spacing: 1px; }
        .btn-premium:hover { background: var(--gold); }
        
        .section { display: none; }
        .active { display: block; }
        
        #cart-sidebar { position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.1); z-index: 999; padding: 40px; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .cart-open #cart-sidebar { right: 0; }
        
        .qty-input { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; }
    </style>
</head>
<body>

    <header>
        <h1>Belinna Store</h1>
        <p>A curadoria que você merece.</p>
    </header>

    <div class="container" id="main-content">
        <div class="grid">
            <div class="card">
                <h2>Makes</h2>
                <p>Acabamento impecável.</p>
                <button class="btn-premium" onclick="showSection('makes')">Ver Coleção</button>
            </div>
            <!-- Adicione mais cards aqui -->
        </div>
    </div>

    <!-- Seção de Produtos (Inicialmente oculta) -->
    <div id="makes" class="container section">
        <button onclick="showSection('main-content')">← Voltar</button>
        <h2>Coleção Makes</h2>
        <div class="grid">
            <div class="card">
                <h3>Batom Velvet</h3>
                <p>R$ 89,90</p>
                <div class="qty-input">
                    <button onclick="changeQty('b1', -1)">-</button>
                    <span id="qty-b1">0</span>
                    <button onclick="changeQty('b1', 1)">+</button>
                </div>
                <button class="btn-premium" onclick="addToCart('Batom Velvet', 89.90, 'qty-b1')">Adicionar</button>
            </div>
        </div>
    </div>

    <div id="cart-sidebar">
        <h2 style="color: var(--rose);">Seu Carrinho</h2>
        <div id="cart-items"></div>
        <button class="btn-premium" style="width:100%; margin-top:20px;" onclick="checkout()">Finalizar Pedido</button>
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.container').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
        
        function changeQty(id, delta) {
            let el = document.getElementById('qty-'+id);
            el.innerText = Math.max(0, parseInt(el.innerText) + delta);
        }

        let cart = [];
        function addToCart(nome, preco, qId) {
            let q = parseInt(document.getElementById(qId).innerText);
            if(q > 0) {
                cart.push({nome, q});
                renderCart();
                document.body.classList.add('cart-open');
            }
        }

        function renderCart() {
            document.getElementById('cart-items').innerHTML = cart.map(i => `<p>${i.q}x ${i.nome}</p>`).join('');
        }

        function checkout() {
            let text = "✨ *Novo Pedido Belinna Store*\n\n";
            cart.forEach(i => text += `• ${i.q}x ${i.nome}\n`);
            text += "\nAguardo confirmação! Obrigada.";
            window.open(`https://wa.me/5511993610210?text=${encodeURIComponent(text)}`);
        }
    </script>
</body>
</html>
